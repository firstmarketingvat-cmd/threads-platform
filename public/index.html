<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Threads Multi-Brand Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Malgun Gothic","Segoe UI",sans-serif;background:#f4f5f7;color:#1c1c1e}
header{background:#111;color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px}
header b{font-size:18px}header span{color:#9aa;font-size:13px}
.wrap{display:flex;min-height:calc(100vh - 52px)}
.side{width:230px;background:#fff;border-right:1px solid #e5e7eb;padding:14px}
.side h3{font-size:12px;color:#888;text-transform:uppercase;margin:6px 4px 10px}
.brand{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;border:1px solid transparent}
.brand:hover{background:#f1f2f4}.brand.on{background:#eef2ff;border-color:#c7d2fe}
.brand .nm{font-weight:700}.brand .meta{font-size:12px;color:#888;margin-top:2px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
.addbtn{width:100%;margin-top:8px;padding:9px;border:1px dashed #bbb;background:#fafafa;border-radius:10px;cursor:pointer;color:#555}
.main{flex:1;padding:22px;max-width:1340px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{padding:9px 14px;border:0;border-radius:9px;background:#111;color:#fff;cursor:pointer;font-weight:600}
.btn.ghost{background:#fff;border:1px solid #ddd;color:#222}
.btn.sm{padding:6px 10px;font-size:13px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:12px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-posted{background:#dcfce7;color:#166534}.b-scheduled{background:#dbeafe;color:#1e40af}.b-draft{background:#fef3c7;color:#92400e}
.post{display:flex;gap:14px}.post img{width:78px;height:98px;object-fit:cover;border-radius:8px;border:1px solid #eee;background:#fafafa}
.post .txt{flex:1;white-space:pre-wrap;font-size:14px;line-height:1.5;color:#333;max-height:160px;overflow:auto}
.postrow{display:flex;gap:14px;align-items:stretch;margin-bottom:12px}
.postrow .card{flex:1;margin-bottom:0;min-width:0}
.srcpanel{width:320px;flex:none;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;font-size:12.5px;line-height:1.55;color:#555;overflow:auto;max-height:360px}
.srcpanel .h{font-weight:800;color:#374151;font-size:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.srcpanel .body{white-space:pre-wrap}
.srcpanel a{color:#2563eb;word-break:break-all}
.srcpanel .empty{color:#b0b4ba;font-style:italic}
.srcpanel .add{cursor:pointer;color:#6366f1;font-weight:700;font-style:normal}
.muted{color:#888;font-size:13px}
input,textarea,select{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:14px;margin-top:4px}
textarea{min-height:120px;resize:vertical}
label{font-size:12px;color:#555;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:9}
.modal .box{background:#fff;border-radius:16px;padding:22px;max-width:640px;width:100%;max-height:90vh;overflow:auto}
.pillars{font-size:13px;color:#555;background:#f8f8f8;border-radius:8px;padding:10px;margin-top:8px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
.cal .hd{font-size:12px;color:#888;font-weight:700;text-align:center;padding:4px}
.cal .cell{background:#fff;border:1px solid #eceef0;border-radius:9px;min-height:104px;padding:7px}
.cal .cell.empty{background:transparent;border:0}
.cal .day{font-weight:700;color:#666;font-size:12px;margin-bottom:5px}
.cal .today{outline:2px solid #6366f1}.cal .today .day{color:#6366f1}
.cal .ev{display:flex;align-items:center;gap:5px;margin-bottom:4px;cursor:pointer;font-size:11px;background:#f7f8fa;border-radius:6px;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal .ev .d{width:8px;height:8px;border-radius:50%;flex:none}
.cal .ev .tm{color:#999;font-variant-numeric:tabular-nums}
.leg{display:flex;gap:16px;margin:8px 0;align-items:center;flex-wrap:wrap}
.studio{display:grid;grid-template-columns:312px 1fr;gap:20px;align-items:start}
.pvwrap{position:sticky;top:0}
.pvcard{width:300px;height:375px;border-radius:12px;overflow:hidden;position:relative;border:1px solid #e5e7eb;font-family:"Pretendard","Malgun Gothic",sans-serif;background:#fff}
.pvhint{font-size:11px;color:#999;text-align:center;margin-top:6px}
.fld{margin-bottom:9px}.fld label{display:block;margin-bottom:2px}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-height:212px;overflow:auto;margin-top:8px;padding:2px}
.thumbs img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent}
.thumbs img.sel{border-color:#6366f1;box-shadow:0 0 0 2px #c7d2fe}
.imgtab{display:flex;gap:6px;margin-bottom:6px}
.imgtab button{padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#444}
.imgtab button.on{background:#111;color:#fff;border-color:#111}
.sec{border-top:1px solid #eee;margin-top:12px;padding-top:10px}
.sec h4{font-size:12px;color:#888;text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px}
</style></head><body>
<header><b>🧵 Threads Multi-Brand Manager</b><span id="hSub"></span>
  <div style="margin-left:auto" class="row">
    <button class="btn ghost sm" id="langBtn" onclick="toggleLang()" title="한국어 / Tiếng Việt"></button>
    <button class="btn ghost sm" id="btnCal" onclick="showCalendar()"></button>
    <button class="btn ghost sm" id="btnSync" onclick="sync()"></button>
    <button class="btn ghost sm" onclick="pexelsKey()" title="Pexels API key — ảnh thật">🖼️ Pexels</button>
    <button class="btn sm" id="btnDeploy" onclick="deploy()"></button>
  </div>
</header>
<div class="wrap">
  <div class="side"><h3 id="sideH"></h3><div id="brandList"></div><button class="addbtn" id="addBtn" onclick="openAdd()"></button></div>
  <div class="main" id="main"></div>
</div>

<div class="modal" id="addM"><div class="box">
  <h2 id="am_title"></h2>
  <div class="grid2" style="margin-top:12px">
    <div><label id="am_l_id"></label><input id="f_id" placeholder="vd: mybrand"></div>
    <div><label id="am_l_name"></label><input id="f_name" placeholder="My Brand"></div>
    <div><label id="am_l_local"></label><input id="f_local" placeholder="마이브랜드"></div>
    <div><label id="am_l_lang"></label><input id="f_lang" value="ko"></div>
    <div style="grid-column:1/3"><label id="am_l_url"></label><input id="f_url" placeholder="https://www.threads.com/@..."></div>
    <div><label id="am_l_red"></label><input id="f_red" value="#e23b3b"></div>
    <div><label id="am_l_ink"></label><input id="f_ink" value="#222222"></div>
    <div style="grid-column:1/3"><label id="am_l_voice"></label><textarea id="f_voice" style="min-height:70px" placeholder="반말, 이모지 절제, CTA 1/3..."></textarea></div>
  </div>
  <div class="row" style="margin-top:14px;justify-content:flex-end"><button class="btn ghost" id="am_cancel" onclick="closeAdd()"></button><button class="btn" id="am_ok" onclick="addBrand()"></button></div>
</div></div>

<script>
/* ===== i18n (KR / VN bilingual) ===== */
const I18N = {
  vi: {
    sub:"quản lý nhiều brand", cal:"📅 Tất cả brand", sync:"🔄 Sync", deploy:"🚀 Deploy lên GitHub",
    syncTip:"Kéo trạng thái đã đăng + link từ GitHub về", langNext:"🇰🇷 한국어",
    brands:"Brands", addBrand:"+ Thêm brand", noBrand:"Chưa có brand.",
    pickBrand:"Chọn 1 brand bên trái để xem lịch nội dung.",
    cPosted:"đã đăng", cSched:"lịch", cDraft:"nháp",
    rerender:"🎨 Render lại ảnh", copyPrompt:"📋 Copy prompt", addPost:"+ Thêm bài",
    schedule:"Lịch nội dung", noPost:'Chưa có bài. Bấm "Copy prompt" → chạy trong Claude → "Thêm bài".',
    stPosted:"✅ đã đăng", stSched:"🔵 đã lên lịch", stDraft:"🟡 nháp",
    viewPost:"🔗 Xem bài", editLink:"🔗 Sửa link", markBtn:"✓ Đã đăng",
    srcHead:"📎 Nguồn viết bài", srcEmpty:"Chưa có nguồn — bấm ✏️ để thêm", colorTip:"Màu ký hiệu brand — đổi là cập nhật ngay",
    designTip:"Kiểu thiết kế thẻ của brand này", aReStyle:(n,s)=>`Đổi thiết kế sang ${s}. Render lại ${n} ảnh (chưa khóa kiểu riêng) luôn không?`,
    view:"Xem ảnh", download:"Tải ảnh", close:"Đóng", reRender:"Tạo lại ảnh", shuffle:"Đổi ảnh khác", lPhoto:"Từ khóa ảnh (Pexels) — để có ảnh thật", lStyle:"Kiểu thẻ ảnh",
    eEdit:"Sửa bài", eAdd:"Thêm bài",
    lDate:"Ngày (YYYY-MM-DD)", lTime:"Giờ đăng (HH:MM)", lTopic:"Topic tag (1 cái)",
    lContent:"Nội dung bài (원고)", lSources:"Nguồn để viết (link + ghi chú)",
    srcPh:"Dán link + ghi chú nguồn ở đây\nVD:\nhttps://threads.com/@... — người dùng hỏi về visa\nhttps://news... — chính sách mới",
    lKicker:"Card kicker", lTag:"Card tag", lHeadline:"Card headline (\\n xuống dòng)",
    lBody:"Card body (\\n xuống dòng)", lCover:"🫥 Che-mờ tạo tò mò (cover — để trống nếu không dùng)",
    lHint:"Badge hint (khi có cover)", delPost:"🗑️ Xóa bài", cancel:"Hủy", save:"Lưu",
    amTitle:"Thêm brand mới", amId:"ID (chữ thường, không dấu)", amName:"Tên brand",
    amLocal:"Tên hiển thị (bản địa)", amLang:"Ngôn ngữ", amUrl:"Link Threads",
    amRed:"Màu nhấn (red)", amInk:"Màu chữ (ink)", amVoice:"Tóm tắt giọng văn", amOk:"Tạo brand",
    calMonth:"Tháng", calAll:"tất cả brand", prev:"Tháng trước", next:"Tháng sau",
    pickMonth:"Chọn tháng/năm", legTime:"giờ = 🇻🇳VN", weekdays:["T2","T3","T4","T5","T6","T7","CN"],
    dTitle:"⚙️ Cài đặt Deploy", dDesc:"Đẩy bài/ảnh lên repo GitHub để cron tự đăng. Token lưu CỤC BỘ trên máy bạn, không đẩy lên GitHub.",
    dRepo:"GitHub repo (owner/name)", dToken:"Token (Contents: Read and write)",
    aCopied:"Đã copy prompt! Dán vào Claude để tạo content cho brand này.",
    aNoCard:"Không có bài nào có card để render.", aRerender:n=>`Render lại ${n} ảnh theo màu mới?`,
    aRerendered:n=>`✅ Đã render lại ${n} ảnh.`, aEditLink:"Sửa link bài Threads:",
    aMark:"Đánh dấu ĐÃ ĐĂNG.\nDán link bài trên Threads (có thể để trống):",
    aUnmark:d=>`Bỏ đánh dấu đã đăng cho ${d}?`, aDelPost:d=>`Xóa bài ${d}?`,
    aDeploy:r=>`Đẩy tất cả bài/ảnh lên GitHub (${r})?\nCron sẽ tự đăng bài tới giờ.`,
    aDeployErr:"⚠️ Lỗi deploy:\n", aSyncOk:o=>`✅ ${o}\n(bài đã đăng sẽ hiện ✅ + 🔗 link)`, aSyncErr:o=>`⚠️ ${o}`,
    aNeedRepo:"Nhập đủ repo + token.", aSavedDeploy:'✅ Đã lưu cấu hình. Bấm "Deploy lên GitHub" lần nữa để đẩy.'
  },
  ko: {
    sub:"여러 브랜드 관리", cal:"📅 전체 브랜드", sync:"🔄 동기화", deploy:"🚀 GitHub 배포",
    syncTip:"GitHub에서 게시 상태 + 링크 가져오기", langNext:"🇻🇳 Tiếng Việt",
    brands:"브랜드", addBrand:"+ 브랜드 추가", noBrand:"브랜드가 없습니다.",
    pickBrand:"왼쪽에서 브랜드를 선택해 콘텐츠 일정을 보세요.",
    cPosted:"게시", cSched:"예약", cDraft:"초안",
    rerender:"🎨 이미지 재렌더", copyPrompt:"📋 프롬프트 복사", addPost:"+ 글 추가",
    schedule:"콘텐츠 일정", noPost:'글이 없습니다. "프롬프트 복사" → Claude 실행 → "글 추가".',
    stPosted:"✅ 게시됨", stSched:"🔵 예약됨", stDraft:"🟡 초안",
    viewPost:"🔗 글 보기", editLink:"🔗 링크 수정", markBtn:"✓ 게시 표시",
    srcHead:"📎 글 소재", srcEmpty:"소재 없음 — ✏️ 눌러 추가", colorTip:"브랜드 색상 — 바꾸면 바로 반영",
    designTip:"이 브랜드의 카드 디자인", aReStyle:(n,s)=>`디자인을 ${s}로 변경. 글별 고정 안 된 이미지 ${n}개 지금 재렌더할까요?`,
    view:"이미지 보기", download:"이미지 저장", close:"닫기", reRender:"이미지 재생성", shuffle:"다른 사진으로", lPhoto:"사진 검색어 (Pexels) — 실제 사진용", lStyle:"카드 스타일",
    eEdit:"글 수정", eAdd:"글 추가",
    lDate:"날짜 (YYYY-MM-DD)", lTime:"게시 시간 (HH:MM)", lTopic:"주제 태그 (1개)",
    lContent:"원고 (본문)", lSources:"소재·출처 (링크 + 메모)",
    srcPh:"여기에 링크 + 메모를 붙여넣으세요\n예:\nhttps://threads.com/@... — 비자 질문 글\nhttps://news... — 최신 정책",
    lKicker:"카드 kicker", lTag:"카드 tag", lHeadline:"카드 headline (\\n 줄바꿈)",
    lBody:"카드 body (\\n 줄바꿈)", lCover:"🫥 호기심 블러 (cover — 안 쓰면 비워둠)",
    lHint:"배지 힌트 (cover 있을 때)", delPost:"🗑️ 글 삭제", cancel:"취소", save:"저장",
    amTitle:"새 브랜드 추가", amId:"ID (소문자, 공백 없이)", amName:"브랜드 이름",
    amLocal:"현지 표기 이름", amLang:"언어", amUrl:"Threads 링크",
    amRed:"강조색 (red)", amInk:"글자색 (ink)", amVoice:"보이스 요약", amOk:"브랜드 생성",
    calMonth:"", calAll:"전체 브랜드", prev:"이전 달", next:"다음 달",
    pickMonth:"월/연도 선택", legTime:"시간 = 🇻🇳VN", weekdays:["월","화","수","목","금","토","일"],
    dTitle:"⚙️ 배포 설정", dDesc:"글/이미지를 GitHub 저장소에 올려 cron이 자동 게시합니다. 토큰은 이 PC에만 저장되며 GitHub로 올라가지 않습니다.",
    dRepo:"GitHub repo (owner/name)", dToken:"토큰 (Contents: Read and write)",
    aCopied:"프롬프트 복사 완료! Claude에 붙여넣어 이 브랜드 콘텐츠를 만드세요.",
    aNoCard:"렌더할 카드가 있는 글이 없습니다.", aRerender:n=>`${n}개 이미지를 새 색상으로 다시 렌더할까요?`,
    aRerendered:n=>`✅ ${n}개 이미지를 다시 렌더했습니다.`, aEditLink:"Threads 글 링크 수정:",
    aMark:"게시됨으로 표시.\nThreads 글 링크를 붙여넣으세요 (비워도 됨):",
    aUnmark:d=>`${d} 게시 표시를 해제할까요?`, aDelPost:d=>`${d} 글을 삭제할까요?`,
    aDeploy:r=>`모든 글/이미지를 GitHub(${r})에 올릴까요?\ncron이 시간에 맞춰 자동 게시합니다.`,
    aDeployErr:"⚠️ 배포 오류:\n", aSyncOk:o=>`✅ ${o}\n(게시된 글은 ✅ + 🔗 링크로 표시)`, aSyncErr:o=>`⚠️ ${o}`,
    aNeedRepo:"repo + 토큰을 모두 입력하세요.", aSavedDeploy:'✅ 설정 저장됨. "GitHub 배포"를 다시 눌러 올리세요.'
  }
};
let LANG = localStorage.getItem('lang') || 'vi';
const t = k => I18N[LANG][k];

/* ===== state ===== */
let cur=null;                 // brand id đang xem
let view={type:'home'};       // {type:'home'|'brand'|'cal', id?, ym?}
const api=(u,o)=>fetch(u,o).then(r=>r.json());
const elBrands=document.getElementById('brandList'), elMain=document.getElementById('main');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const linkify=s=>esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
function colorDot(s){return s==='posted'?'#16a34a':s==='scheduled'?'#2563eb':'#d97706'}

function applyChrome(){
  document.getElementById('hSub').textContent=t('sub');
  document.getElementById('langBtn').textContent=t('langNext');
  document.getElementById('btnCal').textContent=t('cal');
  const sb=document.getElementById('btnSync'); sb.textContent=t('sync'); sb.title=t('syncTip');
  document.getElementById('btnDeploy').textContent=t('deploy');
  document.getElementById('sideH').textContent=t('brands');
  document.getElementById('addBtn').textContent=t('addBrand');
  // add-brand modal labels
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('am_title',t('amTitle'));set('am_l_id',t('amId'));set('am_l_name',t('amName'));set('am_l_local',t('amLocal'));
  set('am_l_lang',t('amLang'));set('am_l_url',t('amUrl'));set('am_l_red',t('amRed'));set('am_l_ink',t('amInk'));
  set('am_l_voice',t('amVoice'));set('am_cancel',t('cancel'));set('am_ok',t('amOk'));
}
function toggleLang(){
  LANG = LANG==='vi'?'ko':'vi'; localStorage.setItem('lang',LANG);
  applyChrome(); rerender();
}
function rerender(){
  if(view.type==='brand') openBrand(view.id);
  else if(view.type==='cal') showCalendar(view.ym);
  else { loadBrands(); elMain.innerHTML=`<p class="muted">${t('pickBrand')}</p>`; }
}

async function loadBrands(){
  const bs=await api('/api/brands');
  elBrands.innerHTML=bs.map(b=>`<div class="brand ${cur===b.id?'on':''}" onclick="openBrand('${b.id}')">
    <div class="nm"><span class="dot" style="background:${b.colors.red}"></span>${b.name}</div>
    <div class="meta">${b.counts.posted}${t('cPosted')} · ${b.counts.scheduled}${t('cSched')} · ${b.counts.draft}${t('cDraft')}</div></div>`).join('')
    || `<p class="muted" style="font-size:13px">${t('noBrand')}</p>`;
}
async function openBrand(id){
  cur=id; view={type:'brand',id}; await loadBrands();
  const d=await api('/api/brand/'+id); const c=d.config;
  elMain.innerHTML=`<div class="row" style="justify-content:space-between">
      <div><h1><input type="color" value="${c.colors.red}" title="${t('colorTip')}" onchange="setColor('${id}',this.value)" style="width:30px;height:30px;border:1px solid #ddd;border-radius:7px;cursor:pointer;vertical-align:middle;padding:0;background:none"> ${c.name} <span class="muted">${c.name_local||''}</span></h1>
      <a class="muted" href="${c.threads_url}" target="_blank">${c.threads_url||''}</a></div>
      <div class="row"><select title="${t('designTip')}" onchange="setBrandStyle('${id}',this.value)" style="height:34px;border:1px solid #ddd;border-radius:7px;padding:0 8px;cursor:pointer;background:#fff">
        ${['photo','note','cert','editorial','bold','dark'].map(s=>`<option value="${s}"${(c.card_style||'editorial')===s?' selected':''}>${STYLE_LABEL[s]}</option>`).join('')}
      </select>
      <button class="btn ghost" onclick="rerenderAll('${id}')">${t('rerender')}</button>
      <button class="btn ghost" onclick="copyPrompt('${id}')">${t('copyPrompt')}</button>
      <button class="btn" onclick="openPost('${id}')">${t('addPost')}</button></div></div>

    el.style.background='#fff';
    el.innerHTML=`<div style="position:absolute;left:20px;right:18px;top:26px">${c.kicker?`<div style="display:flex;align-items:center;gap:7px;color:${C.red};font-weight:800;font-size:9px;letter-spacing:1px"><span style="width:16px;height:2px;background:${C.red};border-radius:2px"></span>${esc(c.kicker).toUpperCase()}</div>`:''}
      <div style="margin-top:13px;color:${C.ink};font-size:21px">${pvBR(pvHL(c.headline))}</div>
      <div style="margin-top:12px;height:1px;background:#0001"></div>
      <div style="margin-top:12px;color:${C.ink};opacity:.82;font-size:11px;line-height:1.45">${pvBR(esc(c.body))}</div></div>${foot(false)}`;
  }
  // nền mờ ảnh thật cho mọi kiểu (trừ photo vốn đã là ảnh full)
  const pim=pvImgUrl();
  if(S!=='photo' && pim){ const dk=(S==='cert'||S==='dark'); const bo=STU.card.bgOpacity; const op=(bo!==''&&bo!=null)?(bo/100):(dk?.26:.15); el.insertAdjacentHTML('afterbegin',`<div style="position:absolute;inset:0;z-index:0;background:#000 center/cover no-repeat;background-image:url('${pim}');filter:blur(5px);transform:scale(1.08);opacity:${op}"></div>`); }
}
async function savePost(id){
  const s=STU; const card={ kicker:s.card.kicker, headline:s.card.headline, body:s.card.body, tag:s.card.tag };
  if(s.card.cover) card.cover=s.card.cover; if(s.card.hint) card.hint=s.card.hint;
  if(s.card.bgOpacity!==''&&s.card.bgOpacity!=null) card.bgOpacity=s.card.bgOpacity;
  if(s.photoIndex!=null) card.photoIndex=s.photoIndex;
  // ảnh
  if(s.img.data){ const up=await api(`/api/brand/${id}/upload`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl:s.img.data,postId:s.pid||s.date})}); if(up.file) card.photoFile=up.file; }
  else if(s.img.url){ card.photoUrl=s.img.url; }
  else if(s.img.file){ card.photoFile=s.img.file; }
  if(s.img.query) card.photoQuery=s.img.query;
  const body={ date:(s.date||'').trim(), time_kst:(s.time||'').trim(), topic:s.topic, text:s.text, sources:s.sources, style:s.style, card };
  if(s.pid) body.id=s.pid;
  if(!body.date||!body.time_kst){ alert('Cần Ngày + Giờ'); return; }
  const r=await api(`/api/brand/${id}/post`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.error)return alert(r.error);
  const pid=r.id||s.pid;
  const sv=document.querySelector('#pM .btn:last-child'); if(sv){sv.textContent='🖼️...';sv.disabled=true;}
  await fetch(`/api/brand/${id}/render/${pid}`,{method:'POST'});
  const e=document.getElementById('pM'); if(e)e.remove(); openBrand(id);
}
async function editPost(id,pid){ const d=await api('/api/brand/'+id); const po=d.posts.find(x=>x.id===pid); openPost(id, po); }
async function delPost(id,date,fromModal){ if(!confirm(t('aDelPost')(date)))return; await fetch(`/api/brand/${id}/post/${date}`,{method:'DELETE'}); if(fromModal){const e=document.getElementById('pM');if(e)e.remove();} openBrand(id); }
async function showCalendar(ym){
  cur=null; view={type:'cal',ym}; await loadBrands();
  const rows=await api('/api/calendar');
  const byDate={}; rows.forEach(r=>{(byDate[r.date]=byDate[r.date]||[]).push(r)});
  if(!ym) ym = rows.length ? rows[0].date.slice(0,7) : new Date().toISOString().slice(0,7);
  view.ym=ym;
  const [Y,M]=ym.split('-').map(Number);
  const days=new Date(Y,M,0).getDate();
  const startDow=(new Date(Y,M-1,1).getDay()+6)%7; // Mon=0
  const today=new Date(); const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const shift=n=>{let m=M+n,y=Y;if(m<1){m=12;y--}if(m>12){m=1;y++}return `${y}-${String(m).padStart(2,'0')}`};
  const hds=t('weekdays');
  let cells=hds.map(h=>`<div class="hd">${h}</div>`).join('');
  for(let i=0;i<startDow;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${ym}-${String(d).padStart(2,'0')}`;
    const evs=(byDate[ds]||[]).map(r=>{const done=r.status==='posted';return `<div class="ev" onclick="${done&&r.permalink?`window.open('${r.permalink}','_blank')`:`openBrand('${r.brand}')`}" title="${r.brandName} · ${r.time_kst} · ${r.topic||''} (${r.status})" style="${done?'opacity:.72':''}">
      <span class="d" style="background:${r.color}"></span><span class="tm">${r.time_kst}</span> ${done?'✅ ':''}${r.topic||r.brandName}</div>`}).join('');
    cells+=`<div class="cell ${ds===todayStr?'today':''}"><div class="day">${d}</div>${evs}</div>`;
  }
  const brandsIn=[...new Set(rows.map(r=>r.brand))].map(b=>{const rr=rows.find(x=>x.brand===b);return `<span class="row" style="gap:6px"><span class="dot" style="background:${rr.color}"></span>${rr.brandName}</span>`}).join('');
  const ttl = LANG==='ko' ? `📅 ${Y}년 ${M}월` : `📅 ${t('calMonth')} ${String(M).padStart(2,'0')}/${Y}`;
  elMain.innerHTML=`<div class="row" style="justify-content:space-between">
    <h1>${ttl} <span class="muted">· ${t('calAll')}</span></h1>
    <div class="row">
      <button class="btn ghost sm" onclick="showCalendar('${shift(-1)}')" title="${t('prev')}">‹</button>
      <input type="month" value="${ym}" onchange="showCalendar(this.value)" title="${t('pickMonth')}" style="width:auto;margin:0;padding:7px 10px">
      <button class="btn ghost sm" onclick="showCalendar('${shift(1)}')" title="${t('next')}">›</button>
    </div></div>
    <div class="leg">${brandsIn}<span class="muted">· ${t('legTime')}</span></div>
    <div class="cal">${cells}</div>`;
}
async function sync(){
  const r=await api('/api/sync',{method:'POST'});
  alert(r.ok?t('aSyncOk')(r.out):t('aSyncErr')(r.out));
  if(cur) openBrand(cur); else { await loadBrands(); showCalendar(view.ym); }
}
async function deploy(){
  const cfg=await api('/api/deploy-config');
  if(!cfg.configured) return deploySettings();
  if(!confirm(t('aDeploy')(cfg.repo)))return;
  const r=await api('/api/deploy',{method:'POST'});
  if(r.needsConfig) return deploySettings();
  alert(r.ok?r.out:(t('aDeployErr')+r.out));
}
function deploySettings(){
  document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="dM" style="display:flex"><div class="box"><h2>${t('dTitle')}</h2>
    <p class="muted" style="margin:8px 0">${t('dDesc')}</p>
    <label>${t('dRepo')}</label><input id="d_repo" placeholder="firstmarketingvat-cmd/threads-platform">
    <label style="margin-top:10px;display:block">${t('dToken')}</label><input id="d_token" type="password" placeholder="github_pat_...">
    <div class="row" style="margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="document.getElementById('dM').remove()">${t('cancel')}</button>
    <button class="btn" onclick="saveDeploy()">${t('save')}</button></div></div></div>`);
}
async function saveDeploy(){
  const repo=document.getElementById('d_repo').value.trim(), token=document.getElementById('d_token').value.trim();
  if(!repo||!token)return alert(t('aNeedRepo'));
  await api('/api/deploy-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo,token})});
  document.getElementById('dM').remove(); alert(t('aSavedDeploy'));
}
async function pexelsKey(){
  const cur=await api('/api/pexels-key');
  const msg=cur.configured?'Đã có Pexels key. Dán key MỚI để thay (hoặc Hủy):':'Dán Pexels API key (lấy ở pexels.com/api):';
  const k=prompt(msg,''); if(k===null)return;
  const r=await api('/api/pexels-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k.trim()})});
  alert(r.ok?'✅ Đã lưu Pexels key.':'⚠️ Key trống.');
}
function openAdd(){document.getElementById('addM').style.display='flex';}
function closeAdd(){document.getElementById('addM').style.display='none';}
async function addBrand(){
  const g=x=>document.getElementById(x).value;
  const body={id:g('f_id'),name:g('f_name'),name_local:g('f_local'),language:g('f_lang'),threads_url:g('f_url'),voice_summary:g('f_voice'),
    colors:{ink:g('f_ink'),red:g('f_red'),bg:'#ffffff',muted:'#6b6b6b'}};
  const r=await api('/api/brand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.error)return alert(r.error); closeAdd(); cur=body.id; await loadBrands(); openBrand(body.id);
}
/* ===== init ===== */
applyChrome();
elMain.innerHTML=`<p class="muted">${t('pickBrand')}</p>`;
loadBrands();
</script></body></html>
